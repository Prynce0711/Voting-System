<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting System</title>
    <style>
      :root {
        --bg: #0f1f3b;
        --bg-soft: #17345f;
        --card: #f4f8ff;
        --text: #132444;
        --accent: #2a7fff;
        --accent-2: #1d4db3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at top right, #2a7fff, var(--bg));
        color: #fff;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(680px, 100%);
        background: linear-gradient(160deg, #ffffff, var(--card));
        color: var(--text);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(9, 25, 58, 0.45);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 20px;
        line-height: 1.5;
        color: #3c5278;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      a.btn {
        display: block;
        text-decoration: none;
        text-align: center;
        font-weight: 700;
        padding: 12px 14px;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        transition:
          transform 0.15s ease,
          background 0.15s ease;
      }

      a.btn:hover {
        transform: translateY(-2px);
        background: var(--accent-2);
      }

      .secondary {
        background: #e7eefc;
        color: #1a3568;
      }

      .secondary:hover {
        background: #d8e6ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Voting System</h1>
      <p>
        This is the single entry point of the project. Use the links below to
        open each page and module from one place.
      </p>

      <div class="grid">
        <a class="btn" href="/landing">Landing Page</a>
        <a class="btn" href="/login">User Login</a>
        <a class="btn" href="/admin/login">Admin Login</a>
        <a class="btn secondary" href="/home">User Homepage</a>
        <a class="btn secondary" href="/admin/dashboard">Admin Dashboard</a>
      </div>
    </main>
  </body>
</html>
